# Build :main image on merge to main
#
# Triggers when commits are pushed to main (including PR merges).
# Pushes maanstr/idrac-fan-controller-rust:main to Docker Hub.
#
# :stable is NOT updated here — it is only updated manually via
# build-local.sh or the promote-stable workflow dispatch.
#
# Build flags match build-local.sh exactly:
#   --platform linux/amd64
#   --provenance=false
#   no cache

name: "Deploy Main"

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: maanstr/idrac-fan-controller-rust

jobs:
  deploy-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push :main
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:latest
