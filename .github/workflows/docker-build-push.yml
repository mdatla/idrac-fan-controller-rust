# Build and Push Docker Image - AMD64 Only
#
# Simplified workflow for Dell PowerEdge R720xd (AMD64 architecture)
# 
# Build Configuration:
#   - Platform: linux/amd64 ONLY
#   - No buildx, no multi-platform, no cache
#   - Simple docker build + docker push
#
# Dell PowerEdge R720xd = Intel Xeon (x86_64/amd64)

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: maanstr/idrac-fan-controller-rust

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image (AMD64)
        run: |
          # Simple docker build - no buildx, no multi-platform
          # Ubuntu runners are AMD64, so this builds AMD64 by default
          docker build -t ${{ env.IMAGE_NAME }}:build-${{ github.sha }} .
          
          # Verify it's AMD64
          ARCH=$(docker image inspect ${{ env.IMAGE_NAME }}:build-${{ github.sha }} --format '{{.Architecture}}')
          echo "Built image architecture: $ARCH"
          if [ "$ARCH" != "amd64" ]; then
            echo "ERROR: Expected amd64, got $ARCH"
            exit 1
          fi

      - name: Tag and push for PRs (beta)
        if: github.event_name == 'pull_request'
        run: |
          docker tag ${{ env.IMAGE_NAME }}:build-${{ github.sha }} ${{ env.IMAGE_NAME }}:beta
          docker push ${{ env.IMAGE_NAME }}:beta
          echo "Pushed :beta tag"

      - name: Tag and push for main (latest)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ env.IMAGE_NAME }}:build-${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker tag ${{ env.IMAGE_NAME }}:build-${{ github.sha }} ${{ env.IMAGE_NAME }}:main
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:main
          echo "Pushed :latest and :main tags"

      - name: Tag and push for version tags
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          docker tag ${{ env.IMAGE_NAME }}:build-${{ github.sha }} ${{ env.IMAGE_NAME }}:${VERSION}
          docker push ${{ env.IMAGE_NAME }}:${VERSION}
          echo "Pushed :${VERSION} tag"

      - name: Verify pushed image (PRs)
        if: github.event_name == 'pull_request'
        run: |
          docker pull ${{ env.IMAGE_NAME }}:beta
          ARCH=$(docker image inspect ${{ env.IMAGE_NAME }}:beta --format '{{.Architecture}}')
          echo "Pulled :beta architecture: $ARCH"
          if [ "$ARCH" != "amd64" ]; then
            echo "ERROR: Pulled image is $ARCH, expected amd64!"
            exit 1
          fi
          echo "Verified :beta is AMD64"

      - name: Verify pushed image (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker pull ${{ env.IMAGE_NAME }}:latest
          ARCH=$(docker image inspect ${{ env.IMAGE_NAME }}:latest --format '{{.Architecture}}')
          echo "Pulled :latest architecture: $ARCH"
          if [ "$ARCH" != "amd64" ]; then
            echo "ERROR: Pulled image is $ARCH, expected amd64!"
            exit 1
          fi
          echo "Verified :latest is AMD64"
